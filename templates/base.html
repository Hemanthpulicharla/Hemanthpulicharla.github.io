<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}K.I.S.S - Keep It Simple, Stupid{% endblock %}</title>
    
    <!-- CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/normalize.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chota.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/syntax.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="canonical" href="{{ request.url }}">
    
    <!-- JavaScript -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/contrib/auto-render.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.slim.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.4.0/mermaid.min.js"></script>
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>
    <!-- Navigation -->
    <section class="section">
        <div class="container">
            <nav id="topnav" class="nav">
                <div id="nav-name" class="nav-left">
                    <a id="nav-anchor" href="{{ url_for('index') }}">
                        <div class="site-title">K.I.S.S</div>
                        <div class="site-subtitle">Keep It Simple & Stupid</div>
                    </a>
                </div>
                <div class="nav-right">
                    <a class="nav-link" aria-label="about" href="{{ url_for('about') }}">
                        <i class="fas fa-user"></i>
                    </a>
                    <a class="nav-link" aria-label="rss" href="/rss.xml" target="_blank" rel="noopener">
                        <i class="fas fa-rss"></i>
                    </a>
                    <a class="nav-link" aria-label="github" href="https://github.com/yourusername" target="_blank" rel="noopener">
                        <i class="fab fa-github"></i>
                    </a>
                    <a class="nav-link" aria-label="twitter" href="https://twitter.com/yourusername" target="_blank" rel="noopener">
                        <i class="fab fa-twitter"></i>
                    </a>
                </div>
            </nav>
        </div>
    </section>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="copy-right">
        <div class="container">
            <div class="is-full-width is-center">
                <p>&copy; <a href="https://github.com/HemanthPulicharla/Bgfish">Hemanth</a> 2025</p>
            </div>
            
        </div>
    </footer>
</body>
</html>
