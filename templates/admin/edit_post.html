{% extends "base.html" %}

{% block title %}{% if post %}Edit Post{% else %}New Post{% endif %} | Admin{% endblock %}

{% block content %}
<section class="container">
    <h1>{% if post %}Edit Post{% else %}New Post{% endif %}</h1>
    
    <form method="POST">
        <div class="row">
            <div class="col-8">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ post.title if post else '' }}" required>
            </div>
            <div class="col-4">
                <label for="slug">Slug</label>
                <input type="text" id="slug" name="slug" value="{{ post.slug if post else '' }}">
            </div>
        </div>
        
        <label for="summary">Summary</label>
        <textarea id="summary" name="summary" rows="3">{{ post.summary if post else '' }}</textarea>
        
        <label for="content">Content (Markdown)</label>
        <textarea id="content" name="content" rows="20" required>{{ post.content if post else '' }}</textarea>
        
        <label for="tags">Tags (comma-separated)</label>
        <input type="text" id="tags" name="tags" value="{{ post.tags if post else '' }}">
        
        <label>
            <input type="checkbox" name="is_draft" {% if post and post.is_draft %}checked{% endif %}>
            Save as draft
        </label>
        
        <div class="row">
            <div class="col">
                <button type="submit" class="button primary">Save Post</button>
                <a href="{{ url_for('admin') }}" class="button outline">Cancel</a>
            </div>
        </div>
    </form>
</section>
{% endblock %}
